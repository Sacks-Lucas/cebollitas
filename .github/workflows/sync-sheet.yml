name: Weekly Sheet <-> DB sync

# Runs the football matches reconciliation between the Google Sheet and Mongo.
on:
  schedule:
    # Mondays 12:00 UTC == 09:00 Argentina (UTC-3).
    - cron: "0 12 * * 1"
  # Lets you trigger it by hand from the Actions tab (defaults to a safe dry run).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (report only, write nothing)"
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: api/.python-version

      - name: Install dependencies
        working-directory: api
        run: pip install -r requirements.txt

      - name: Run sync
        working-directory: api
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          # Scheduled runs write; manual runs use the dry_run input (default true).
          SYNC_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/sync_sheet_matches.py
