# Render Blueprint — weekly Sheet <-> DB sync.
#
# This defines ONLY the cron job. Your existing web service / DB are managed
# separately in the Render dashboard; adding this file does not touch them.
#
# You can either commit this Blueprint, or skip it and create the same Cron Job
# by hand in the dashboard (New -> Cron Job) with the schedule and command below.
services:
  - type: cron
    name: cebollitas-sheet-sync
    runtime: python
    rootDir: api
    # Mondays 12:00 UTC == 09:00 Argentina (UTC-3).
    schedule: "0 12 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/sync_sheet_matches.py
    envVars:
      # Reuse the same Mongo connection as the web service.
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: cebollitas
      # Google service-account key, pasted as raw JSON (one line).
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      # Flip to "true" for the first runs to preview changes without writing.
      - key: SYNC_DRY_RUN
        value: "false"
